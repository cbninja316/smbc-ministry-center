<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Accord — Manage Users</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="nav">
    <a href="#" id="nav-brand" class="nav-brand">One Accord</a>
    <div class="nav-user">
      <span id="nav-username"></span>
      <button id="logout-btn">Sign Out</button>
    </div>
  </nav>

  <div class="dashboard">
    <div class="dashboard-header">
      <h1>Manage Users</h1>
      <button class="btn btn-primary" id="invite-btn">+ Invite Admin</button>
    </div>

    <div class="section-card">
      <div id="alert-container"></div>
      <table class="receipts-table" id="users-table">
        <thead>
          <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Item Access</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="6" style="color:var(--text-muted);padding:20px 0;">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/modals.js"></script>
  <script>
    const ITEM_TYPES = ['ChurchEvent', 'FacilityUse', 'Benevolence', 'Maintenance', 'SecretaryRequest', 'Receipt'];
    const ITEM_TYPE_LABELS = {
      ChurchEvent:      'Church Events',
      FacilityUse:      'Facility Use',
      Benevolence:      'Benevolence',
      Maintenance:      'Maintenance',
      SecretaryRequest: 'Secretary Requests',
      Receipt:          'Receipts',
    };

    document.addEventListener('DOMContentLoaded', () => {
      requireAuth();
      if (!isSuperAdmin()) { window.location.href = _page('dashboard'); return; }

      const session = getSession();
      document.getElementById('nav-username').textContent = session?.username || '';
      document.getElementById('logout-btn').addEventListener('click', () => {
        clearSession(); window.location.href = _page('login');
      });
      document.getElementById('nav-brand').href = _page('dashboard');

      loadUsers();
      document.getElementById('invite-btn').addEventListener('click', openInviteModal);
    });

    async function loadUsers() {
      try {
        const users = await Users.getAll();
        renderUsers(users);
      } catch (e) {
        showPageAlert(e.message);
      }
    }

    function renderUsers(users) {
      const tbody = document.getElementById('users-body');
      tbody.innerHTML = '';

      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="color:var(--text-muted);padding:20px 0;">No users found.</td></tr>';
        return;
      }

      users.forEach(u => {
        const tr = document.createElement('tr');
        const accessLabels = u.allowedItemTypes.length
          ? u.allowedItemTypes.map(t => ITEM_TYPE_LABELS[t] || t).join(', ')
          : (u.role === 'SuperAdmin' ? 'All (Super Admin)' : 'None');

        tr.innerHTML = `
          <td><strong>${escHtml(u.username)}</strong></td>
          <td style="color:var(--text-muted)">${escHtml(u.email)}</td>
          <td>${u.role === 'SuperAdmin' ? '<span style="color:var(--primary);font-weight:600;">Super Admin</span>' : 'Admin'}</td>
          <td>${u.isActive
            ? '<span style="color:var(--urgency-low-text);font-weight:600;">Active</span>'
            : '<span style="color:var(--text-muted);">Pending</span>'}</td>
          <td style="font-size:0.82rem;color:var(--text-muted)">${escHtml(accessLabels)}</td>
          <td style="display:flex;gap:8px;align-items:center;">
            ${u.role !== 'SuperAdmin' ? `<button class="btn btn-sm btn-primary" data-action="edit">Edit</button>` : ''}
            ${u.username !== getSession()?.username ? `<button class="btn btn-sm" data-action="delete" style="background:#fee2e2;color:#991b1b;">Delete</button>` : ''}
          </td>
        `;

        tr.querySelector('[data-action="edit"]')?.addEventListener('click', () => openEditUserModal(u));
        tr.querySelector('[data-action="delete"]')?.addEventListener('click', async () => {
          if (!confirm(`Delete ${u.username}? This cannot be undone.`)) return;
          try {
            await Users.delete(u.id);
            showPageAlert(`${u.username} has been deleted.`, 'success');
            loadUsers();
          } catch (e) {
            showPageAlert(e.message);
          }
        });
        tbody.appendChild(tr);
      });
    }

    function openInviteModal() {
      const overlay = openModal(`
        <div class="modal-header">
          <h2>Invite Admin</h2>
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          </button>
        </div>
        <div class="field">
          <label>Username</label>
          <input type="text" id="inv-username" placeholder="e.g. jsmith">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="inv-email" placeholder="e.g. jsmith@church.org">
        </div>
        <div class="field">
          <label>Role</label>
          <select id="inv-role">
            <option value="Admin">Admin</option>
            <option value="SuperAdmin">Super Admin</option>
          </select>
        </div>
        <div class="field" id="inv-types-field">
          <label>Item Access</label>
          <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">
            ${ITEM_TYPES.map(t => `
              <label class="check-wrap">
                <input type="checkbox" value="${t}" class="inv-type-cb">
                ${ITEM_TYPE_LABELS[t]}
              </label>
            `).join('')}
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-primary" id="inv-submit-btn">Send Invite</button>
        </div>
      `);

      overlay.querySelector('#inv-role').addEventListener('change', function() {
        overlay.querySelector('#inv-types-field').style.display =
          this.value === 'SuperAdmin' ? 'none' : '';
      });

      overlay.querySelector('#inv-submit-btn').addEventListener('click', async () => {
        const username = overlay.querySelector('#inv-username').value.trim();
        const email = overlay.querySelector('#inv-email').value.trim();
        const role = overlay.querySelector('#inv-role').value;
        const types = [...overlay.querySelectorAll('.inv-type-cb:checked')].map(cb => cb.value);

        if (!username || !email) {
          showAlert(overlay.querySelector('.modal'), 'Username and email are required.');
          return;
        }

        try {
          await Users.invite({ email, username, role, allowedItemTypes: types });
          closeModal(overlay);
          showPageAlert('Invite sent successfully.', 'success');
          loadUsers();
        } catch (e) {
          showAlert(overlay.querySelector('.modal'), e.message);
        }
      });
    }

    function openEditUserModal(user) {
      const currentTypes = user.allowedItemTypes || [];

      const overlay = openModal(`
        <div class="modal-header">
          <h2>Edit ${escHtml(user.username)}</h2>
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          </button>
        </div>
        <div class="field">
          <label>Item Access</label>
          <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">
            ${ITEM_TYPES.map(t => `
              <label class="check-wrap">
                <input type="checkbox" value="${t}" class="edit-type-cb" ${currentTypes.includes(t) ? 'checked' : ''}>
                ${ITEM_TYPE_LABELS[t]}
              </label>
            `).join('')}
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-danger" id="del-user-btn">Remove User</button>
          <button class="btn btn-primary" id="save-user-btn">Save</button>
        </div>
      `);

      overlay.querySelector('#save-user-btn').addEventListener('click', async () => {
        const types = [...overlay.querySelectorAll('.edit-type-cb:checked')].map(cb => cb.value);
        try {
          await Users.updatePermissions(user.id, types);
          closeModal(overlay);
          showPageAlert('Permissions updated.', 'success');
          loadUsers();
        } catch (e) {
          showAlert(overlay.querySelector('.modal'), e.message);
        }
      });

      overlay.querySelector('#del-user-btn').addEventListener('click', async () => {
        if (!confirm(`Remove ${user.username}? This cannot be undone.`)) return;
        try {
          await Users.delete(user.id);
          closeModal(overlay);
          showPageAlert('User removed.', 'success');
          loadUsers();
        } catch (e) {
          showAlert(overlay.querySelector('.modal'), e.message);
        }
      });
    }

    function showPageAlert(msg, type = 'error') {
      const el = document.getElementById('alert-container');
      el.innerHTML = `<div class="alert alert-${type}">${escHtml(msg)}</div>`;
      setTimeout(() => el.innerHTML = '', 4000);
    }

    function escHtml(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
